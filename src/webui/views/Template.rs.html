@(title)
@use "Navigation";

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rotonda WebUI</title>
    <style>
        table, tr, td, th {
            border: 1px solid black;
        }
        table {
            /*min-width: 95%;*/
            white-space: nowrap;
        }
        td {
            padding: 2px 10px;
        }
        th {
            position: sticky;
            top: 0;
            padding: 5px;
            background: whitesmoke;
        }
        .green {
            background: greenyellow;
        }
        .yellow {
            background: yellow;
        }
        .red {
            background: red;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <nav>
        <Navigation />
        </nav>
        <main>
            <h1>@title</h1>
            @child_content
        </main>
    </div>
</body>
</html>
