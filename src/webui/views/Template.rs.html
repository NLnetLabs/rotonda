@(title)
@use "Navigation";

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rotonda WebUI</title>
    <style>
        table, tr, td, th {
            border: 1px solid black;
        }
        table {
            /*min-width: 95%;*/
            white-space: nowrap;
        }
        td {
            padding: 2px 10px;
        }
        th {
            position: sticky;
            top: 0;
            padding: 5px;
            background: whitesmoke;
        }
        .green {
            background: greenyellow;
        }
        .yellow {
            background: yellow;
        }
        .red {
            background: red;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: fit-content;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            top: 2em;
            left: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            transform: translateX(-50%);
            font-weight: initial;
        }

        .tooltip .tooltiptext::before {
            content: "";
            position: absolute;
            bottom: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent transparent #555 transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <nav>
        <Navigation />
        </nav>
        <main>
            <h1>@title</h1>
            @child_content
        </main>
    </div>
</body>
</html>
